{% load allauth %}

<button
    type="{{ attrs.type|default:'submit' }}"
    class="aa-button"
>
    {% slot %}
    {% endslot %}
</button>

<style>

.aa-button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.aa-button:hover {
    background: #1d4ed8;
}

</style>
