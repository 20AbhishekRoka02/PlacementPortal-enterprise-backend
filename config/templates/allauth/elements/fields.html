{% for field in form %}

    <div style="margin-bottom:18px;">

        {{ field.label_tag }}

        {{ field }}

        {{ field.errors }}

    </div>

    <script>
        document.getElementById("{{ field.id_for_label }}")?.classList.add("aa-input")
    </script>

{% endfor %}

<style>

.aa-input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    margin-top: 8px;
    font-size: 14px;
}

.aa-input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
}

</style>
