services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    tty: true
    stdin_open: true
    depends_on:
      - db
      - adminer
    working_dir: /app
    command: bash -c "python3 manage.py runserver 0.0.0.0:8000"
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: placement_portal
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
  adminer:
    image: adminer
    depends_on:
      - db
    ports:
      - "8080:8080"
volumes:
  db_data: