<h1>Available Jobs</h1>

{% for job in jobs %}

    <div>

        <h2>
            <a href="{% url 'job_detail' job.id %}">
                {{ job.title }}
            </a>
        </h2>

        <p>
            {{ job.company }}
        </p>

        <p>
            {{ job.location }}
        </p>

        <p>
            Deadline:
            {{ job.deadline }}
        </p>

    </div>

    <hr>

{% empty %}

    <p>
        No jobs available.
    </p>

{% endfor %}
